services:
  libreoffice:
    image: segmentica-libreoffice:local
    build:
      context: .
      dockerfile: services/document-renderer/Dockerfile
    container_name: segmentica-libreoffice
    ports:
      - "3001:3000"
    environment:
      PORT: 3000
      LIBREOFFICE_BIN: /usr/bin/soffice
      TEMPLATES_DIR: /app/templates/forms
    volumes:
      - ./templates:/app/templates
      - ./services/document-renderer/app.py:/app/app.py:ro
    restart: unless-stopped
