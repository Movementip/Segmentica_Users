services:
  db:
    image: postgres:17
    container_name: segmentica-postgres
    environment:
      POSTGRES_DB: Segmentica
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5439:5432"
    volumes:
      - segmentica-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d Segmentica"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  vpn:
    image: qmcgaw/gluetun:latest
    container_name: segmentica-vpn
    entrypoint:
      - /bin/sh
      - /gluetun-route-fix.sh
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    env_file:
      - .env.local
    environment:
      TZ: Asia/Yekaterinburg
    ports:
      - "31415:31415"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - gluetun:/gluetun
      - ./infra/vpn/gluetun-route-fix.sh:/gluetun-route-fix.sh:ro
    restart: unless-stopped

  libreoffice:
    image: segmentica-libreoffice:local
    build:
      context: .
      dockerfile: services/document-renderer/Dockerfile
    container_name: segmentica-libreoffice
    ports:
      - "3010:3000"
    environment:
      PORT: 3000
      LIBREOFFICE_BIN: /usr/bin/soffice
      TEMPLATES_DIR: /app/templates/forms
    volumes:
      - ./backend/templates:/app/templates
      - ./services/document-renderer/app.py:/app/app.py:ro
    restart: unless-stopped

  symmetricds:
    image: segmentica-symmetricds:local
    build:
      context: ./services/symmetricds
      dockerfile: Dockerfile
    container_name: segmentica-symmetricds
    network_mode: "service:vpn"
    depends_on:
      db:
        condition: service_healthy
      vpn:
        condition: service_started
    env_file:
      - .env.local
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: Segmentica
      DB_USER: postgres
      DB_PASSWORD: postgres
      SYMMETRIC_DB_URL: jdbc:postgresql://db:5432/Segmentica
      SYMMETRIC_DB_USER: postgres
      SYMMETRIC_DB_PASSWORD: postgres
    volumes:
      - symmetricds-logs:/opt/symmetricds/logs
      - symmetricds-tmp:/opt/symmetricds/tmp
    restart: unless-stopped

volumes:
  segmentica-postgres-data:
    name: segmentica-postgres-data
  gluetun:
  symmetricds-logs:
  symmetricds-tmp:
