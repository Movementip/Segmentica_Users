##############################################################################
# NODE IDENTITY
##############################################################################
engine.name=node-mac
group.id=client
external.id=mac-node

##############################################################################
# DATABASE
##############################################################################
db.driver=org.postgresql.Driver
db.url=jdbc:postgresql://localhost:5438/Segmentica
db.user=postgres
db.password=postgres

db.validation.query=select 1

##############################################################################
# HTTP / SYNC
##############################################################################
sync.url=http://192.168.2.233:31415/sync/node-mac
registration.url=http://192.168.2.203:31415/sync/node-win

##############################################################################
# CORE JOBS / RUNTIME
##############################################################################
job.routing.period.time.ms=10000
job.push.period.time.ms=10000
job.pull.period.time.ms=10000
job.heartbeat.period.time.ms=15000
job.watchdog.period.time.ms=60000

##############################################################################
# REGISTRATION / NODE BEHAVIOR
##############################################################################
push.job.random.max.time.ms=0
pull.job.random.max.time.ms=0
initial.load.create.first=true

##############################################################################
# CONFLICT / LOAD / BATCH
##############################################################################
incoming.batches.record.ok.enabled=true
outgoing.batches.record.ok.enabled=true
data.loader.max.rows.before.commit=10000
routing.stale.dataid.gap.time.ms=60000

##############################################################################
# POSTGRESQL
##############################################################################
jdbc.streaming.results=true

##############################################################################
# LOGGING / DEBUG
##############################################################################
